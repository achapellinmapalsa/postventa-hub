const inDateRange = (value, from, to) => {
  if (!value) return !from && !to;

  if (to && v > to) return false;
  return true;
};

const API_URL = "https://script.google.com/macros/s/AKfycbxhdb7LvI5o1Odp9hbEiu_-n8Crupi9Up3_mjO2sfhOQlWXNP6Mu60d2sOW66FS77D6Yg/exec";

const apiEnabled = () => API_URL && !API_URL.includes("PEGA_AQUI");

function rowsToObjects(rows) {
  if (!Array.isArray(rows) || rows.length < 2) return [];
  const headers = rows[0].map(h => String(h || "").trim());
  return rows.slice(1)
    .filter(row => row.some(v => v !== "" && v !== null && v !== undefined))
    .map(row => Object.fromEntries(headers.map((h, i) => [h, row[i] ?? ""])));
}

async function apiGet(action) {
  if (!apiEnabled()) return null;
  const res = await fetch(`${API_URL}?action=${action}`);
  const json = await res.json();
  if (json?.error) throw new Error(json.error);
  return json;
}

async function apiPost(action, payload) {
  if (!apiEnabled()) return null;
  const res = await fetch(`${API_URL}?action=${action}`, {
    method: "POST",
    // text/plain evita problemas de preflight/CORS con Apps Script.
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
  });
  const json = await res.json();
  if (json?.error) throw new Error(json.error);
  return json;
}

function normalizePedido(pedido, items) {
  return {
    ...pedido,
    items: items.filter(it => String(it.pedido_id || "") === String(pedido.id || "")),
  };
}

function pickFirst(row, keys) {
  for (const k of keys) {
    if (row[k] !== undefined && row[k] !== null && String(row[k]).trim() !== "") return String(row[k]).trim();
  }
  return "";
}

function uniqClean(list) {
  return [...new Set((list || []).map(v => String(v || "").trim()).filter(Boolean))].sort();
}

function toProductObj(r) {
  if (typeof r === "string") return { codsap:"", producto:r, familia:"", activo:"SI", label:r };
  const codsap = pickFirst(r, ["CODSAP", "codsap", "CODPE", "codpe", "CODIGO_SAP", "codigo_sap"]);
  const producto = pickFirst(r, ["PRODUCTO", "producto", "Producto", "nombre", "Nombre"]);
  const familia = pickFirst(r, ["FAMILIA", "familia", "Familia"]);
  const activo = pickFirst(r, ["ACTIVO", "activo", "Activo"]) || "SI";
  return { codsap, producto, familia, activo, label: codsap ? `${codsap} - ${producto}` : producto };
}

  const fallasRows = rowsToObjects(raw?.fallas || []);
  const talleresRows = rowsToObjects(raw?.talleres || []);
  const repuestosRows = rowsToObjects(raw?.repuestos || []);

  return {
    productos: productosRows.map(toProductObj).filter(p => p.producto && String(p.activo || "SI").toUpperCase() !== "NO"),
    tiendas: tiendasRows.map(toTiendaObj).filter(t => t.tienda),
    transportistas: transportistasRows.map(toTransportistaObj).filter(t => t.transportista),
    fallas: fallasRows.map(toFallaObj).filter(f => f.falla),
    talleres: talleresRows.map(toTallerObj).filter(t => t.id || t.nombre),
    repuestos: repuestosRows.map(toRepuestoObj).filter(r => r.repuesto || r.cod_repuesto),
  };
}

function productLabel(p) { return typeof p === "string" ? p : (p.label || p.producto || ""); }
function fallaLabel(f) { return typeof f === "string" ? f : (f.label || f.falla || ""); }
function tiendaLabel(t) { return typeof t === "string" ? t : (t.label || t.tienda || ""); }
function transportistaLabel(t) { return typeof t === "string" ? t : (t.label || t.transportista || ""); }
function productValue(p) { return typeof p === "string" ? p : p.producto; }
function fallaValue(f) { return typeof f === "string" ? f : f.falla; }
function tiendaValue(t) { return typeof t === "string" ? t : t.tienda; }
function transportistaValue(t) { return typeof t === "string" ? t : t.transportista; }

function EstadoStepper({ tipo, estadoActual, onCambiar }) {
  const estados = getEstados(tipo);

  const renderEstado = (e, i, esActual, esComp, esFut, compact=false) => (
    <div key={e.id} onClick={()=>onCambiar(e.id)}
      style={{ display:"flex", alignItems:"center", gap:10, padding:compact?"9px 10px":"9px 13px", borderRadius:9, cursor:"pointer",
        background:esActual?e.color+"22":esComp?"#1e293b":"#0a1628",
        border:esActual?`1.5px solid ${e.color}`:"1px solid #1e293b", opacity:esFut?0.45:1 }}>
      <div style={{ width:26, height:26, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:12,
        background:esActual?e.color:esComp?"#10b98133":"#1e293b",
        border:esActual?`2px solid ${e.color}`:esComp?"2px solid #10b981":"1px solid #334155",
        color:esActual?"#fff":esComp?"#10b981":"#475569", fontWeight:700 }}>
        {esComp?"✓":(e.icon || i+1)}
      </div>
      <div style={{ flex:1 }}>
        <div style={{ color:esActual?e.color:esComp?"#94a3b8":"#64748b", fontWeight:esActual?700:500, fontSize:13 }}>{e.label}</div>
        {esActual && <div style={{ color:"#64748b", fontSize:11, marginTop:1 }}>{e.desc}</div>}
      </div>
      {esActual && <div style={{ width:7, height:7, borderRadius:"50%", background:e.color }} />}
    </div>
  );

  if (tipo === "DEVOLUCION") {
    const levelById = Object.fromEntries(estados.map(e => [e.id, e.nivel ?? estados.indexOf(e)]));
    const currentLevel = levelById[estadoActual] ?? 0;
    const branch = estados.filter(e => e.nivel === 1);
    const afterBranch = estados.filter(e => (e.nivel ?? 0) > 1);
    const first = estados.find(e => e.id === "caso_recibido");
    return (
      <div>
        <div style={{ fontSize:11, color:"#475569", fontWeight:700, marginBottom:10, textTransform:"uppercase" }}>Flujo — {tipo}</div>
        <div style={{ display:"flex", flexDirection:"column", gap:5, marginBottom:16 }}>
          {first && renderEstado(first, 0, estadoActual===first.id, currentLevel>0, currentLevel>0)}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {branch.map((e,i)=>renderEstado(e, i+1, estadoActual===e.id, currentLevel>1, currentLevel>1, true))}
          </div>
          {afterBranch.map((e,i)=>{
            const lv = levelById[e.id] ?? i+2;
            return renderEstado(e, i+3, estadoActual===e.id, lv<currentLevel, lv>currentLevel);
          })}
        </div>
      </div>
    );
  }

  const idx = estados.findIndex(e=>e.id===estadoActual);
  return (
    <div>
      <div style={{ fontSize:11, color:"#475569", fontWeight:700, marginBottom:10, textTransform:"uppercase" }}>Flujo — {tipo}</div>
      <div style={{ display:"flex", flexDirection:"column", gap:5, marginBottom:16 }}>
        {estados.map((e,i) => {
          const esActual = e.id===estadoActual, esComp = i<idx, esFut = i>idx;
          return renderEstado(e, i, esActual, esComp, esFut);
        })}
      </div>
    </div>
  );
}

function ItemsRepuesto({ items, onChange, productos = PRODUCTOS.map(toProductObj), repuestos = [] }) {
  const add = () => onChange([...items, { cod_repuesto:"", repuesto:"", referencia:"", codsap:"", producto:"", cantidad:1 }]);
  const upd = (i, k, v) => onChange(items.map((it,idx)=>idx===i?{...it,[k]:v}:it));
  const selectProducto = (i, texto) => {
    const q = String(texto || "").trim().toLowerCase();
    const prod = productos.find(p => q && (q === String(p.codsap || "").toLowerCase() || q === String(p.producto || "").toLowerCase() || q === productLabel(p).toLowerCase()));
    onChange(items.map((it,idx)=>idx===i?{...it, producto:prod ? productValue(prod) : texto, codsap:prod ? (prod.codsap || "") : ""}:it));
  };
  const selectRepuesto = (i, texto) => {
    const q = String(texto || "").trim().toLowerCase();
    const rep = repuestos.find(r => q && (
      q === String(r.cod_repuesto || "").toLowerCase() ||
      q === String(r.referencia || "").toLowerCase() ||
      q === String(r.repuesto || "").toLowerCase() ||
      q === `${r.cod_repuesto || r.referencia || ""} · ${r.repuesto || ""}${r.codsap ? " · "+r.codsap : ""}`.toLowerCase()
    ));
    if (!rep) return;
    onChange(items.map((it,idx)=>idx===i?{...it, cod_repuesto:rep.cod_repuesto||rep.referencia||"", repuesto:rep.repuesto||"", referencia:rep.referencia||rep.cod_repuesto||"", codsap:rep.codsap||"", producto:rep.producto||it.producto}:it));
  };
  const del = i => onChange(items.filter((_,idx)=>idx!==i));
  const repuestosList = repuestos.filter(r => r.repuesto || r.referencia);
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <label style={{ color:"#64748b", fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.06em" }}>Repuestos solicitados</label>
        <button onClick={add} style={{ ...S.btn("#8b5cf6"), padding:"5px 12px", fontSize:12 }}>+ Agregar repuesto</button>
      </div>
      {items.map((item, i) => (
        <div key={i} style={{ background:"#1e293b", borderRadius:10, padding:"12px 14px", marginBottom:8, display:"grid", gridTemplateColumns:"2fr 1.2fr 1.5fr 60px 32px", gap:8, alignItems:"center" }}>
          <input style={S.inp} list="repuestos-list" placeholder="Nombre o código del repuesto" value={item.repuesto} onChange={e=>upd(i,"repuesto",e.target.value)} onBlur={e=>selectRepuesto(i,e.target.value)} />
          <input style={S.inp} placeholder="Referencia" value={item.referencia} onChange={e=>upd(i,"referencia",e.target.value)} />
          <input style={S.inp} list="productos-list-repuestos" placeholder="CODSAP o producto" value={item.producto} onChange={e=>upd(i,"producto",e.target.value)} onBlur={e=>selectProducto(i,e.target.value)} />
          <input style={{ ...S.inp, textAlign:"center" }} type="number" min="1" placeholder="Cant." value={item.cantidad} onChange={e=>upd(i,"cantidad",parseInt(e.target.value)||1)} />
          <button onClick={()=>del(i)} style={{ background:"#ef444422", border:"1px solid #ef444444", borderRadius:6, color:"#ef4444", cursor:"pointer", fontWeight:700, fontSize:14, height:36 }}>×</button>
        </div>
      ))}
      <datalist id="repuestos-list">
        {repuestosList.map((r, idx)=><option key={idx} value={`${r.cod_repuesto || r.referencia || ""}${r.cod_repuesto || r.referencia ? " · " : ""}${r.repuesto || ""}${r.codsap ? " · "+r.codsap : ""}`} />)}
      </datalist>
      <datalist id="productos-list-repuestos">
        {productos.map(p=><option key={p.codsap || p.producto} value={productLabel(p)} />)}
      </datalist>
      {items.length===0 && <div style={{ color:"#334155", fontSize:13, textAlign:"center", padding:"12px 0" }}>Sin repuestos — usa el botón para agregar</div>}
    </div>
  );
}

  const [cartaModal, setCartaModal] = useState(null);
  const [selPedido, setSelPedido] = useState(null);
  const [selTaller, setSelTaller] = useState(null);

  // Formularios
  const blankCaso = { ost:"", cod_tienda:"", tienda:"", local:"", codsap:"", producto:"", familia:"", cod_falla:"", falla:"", tipo:"SERVICIO TECNICO", cod_taller:"", taller_id:"", taller:"", transportista:"", fecha_caso:today(), modalidad_devolucion:"", fecha_carta_autorizacion:"", fecha_recojo:"", guia_recojo:"", fecha_llegada_taller:"", fecha_envio_tienda:"", guia_envio:"", transportista_envio:"", obs:"" };
  const blankPedido = { cod_taller:"", taller_id:"", tipo_pedido:"GARANTIA", num_pedido:"", fecha_solicitud:today(), guia:"", transportista:"", notas:"", items:[{ cod_repuesto:"", repuesto:"", referencia:"", codsap:"", producto:"", cantidad:1 }] };

        setUsuarios(usuariosApi);

  // Stats

    return {
      total: casos.length, activos: activos.length,
      cerrados: casos.filter(c=>isCerrado(c)).length,
      pend_recojo: casos.filter(c=>c.estado==="pendiente_recojo").length,
      listo_envio: casos.filter(c=>c.estado==="listo_envio").length,
      cambio_sap:  casos.filter(c=>c.estado==="cambio_entregado").length,
      rep_pend:    pedidos.filter(p=>p.estado!=="recibido_taller").length,
      prom_dias:   conDias.length ? Math.round(conDias.reduce((a,c)=>a+c.dias_solucion,0)/conDias.length) : null,
      por_tipo:    TIPOS.reduce((acc,t)=>({...acc,[t]:casos.filter(c=>c.tipo===t).length}),{}),
    };
  }, [casos, pedidos]);

  // Filtrado casos
  const casosFiltrados = useMemo(()=>casos.filter(c=>{
    if (fCierre==="activos"  && isCerrado(c))  return false;
    if (fCierre==="cerrados" && !isCerrado(c)) return false;
    if (fTienda!=="todos" && c.tienda!==fTienda) return false;
    if (fTaller!=="todos" && c.taller_id!==fTaller) return false;
    if (fTipo!=="todos"   && c.tipo!==fTipo)     return false;
    if (!inDateRange(c.fecha_caso, casosDesde, casosHasta)) return false;
    if (search && !`${c.id || ""} ${c.ost || ""} ${c.local || ""} ${c.codsap || ""} ${c.producto || ""} ${c.cod_falla || ""} ${c.falla || ""} ${c.guia_recojo || ""} ${c.guia_envio || ""}`.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }), [casos, fCierre, fTienda, fTaller, fTipo, search, casosDesde, casosHasta]);

  const provinciasTalleres = useMemo(() => {
    return [...new Set(talleresList.map(t => t.provincia).filter(Boolean))].sort();
  }, [talleresList]);

  const talleresFiltrados = useMemo(() => {
    const q = searchTaller.trim().toLowerCase();
    return talleresList.filter(t => {
      const provincia = String(t.provincia || "");
      const texto = `${t.id || ""} ${t.cod_taller || ""} ${t.nombre || ""} ${provincia} ${t.contacto || ""} ${t.email || ""} ${t.tel || ""}`.toLowerCase();
      if (fProvinciaTaller !== "todos" && provincia !== fProvinciaTaller) return false;
      if (q && !texto.includes(q)) return false;
      return true;
    });
  }, [talleresList, searchTaller, fProvinciaTaller]);

  const pedidosFiltrados = useMemo(() => {
    const q = pedidosSearch.trim().toLowerCase();
    return pedidos.filter(p => {
      if (!inDateRange(p.fecha_solicitud, pedidosDesde, pedidosHasta)) return false;
      const taller = getTaller(p.taller_id);
      const itemsText = (p.items || []).map(it => `${it.cod_repuesto || ""} ${it.repuesto || ""} ${it.referencia || ""} ${it.codsap || ""} ${it.producto || ""}`).join(" ");
      const texto = `${p.id || ""} ${p.num_pedido || ""} ${p.tipo_pedido || ""} ${p.guia || ""} ${p.transportista || ""} ${taller?.nombre || ""} ${taller?.provincia || ""} ${itemsText}`.toLowerCase();
      if (q && !texto.includes(q)) return false;
      return true;
    });
  }, [pedidos, pedidosSearch, pedidosDesde, pedidosHasta, maestros.talleres]);

  function aplicarRango(tipo, scope) {
    const now = new Date();
    let desde = "", hasta = "";
    if (tipo === "semana") { desde = dateOnly(startOfWeek(now)); hasta = dateOnly(endOfWeek(now)); }
    if (tipo === "mes") { desde = dateOnly(startOfMonth(now)); hasta = dateOnly(endOfMonth(now)); }
    if (tipo === "limpiar") { desde = ""; hasta = ""; }
    if (scope === "casos") { setCasosDesde(desde); setCasosHasta(hasta); }
    if (scope === "pedidos") { setPedidosDesde(desde); setPedidosHasta(hasta); }
  }

  const SLA_CASOS = {
    pendiente_recojo: 3,
    en_taller: 3,
    en_reparacion: 4,
    listo_envio: 2,
    cambio_entregado: 5,
  };
  const SLA_PEDIDOS = { pendiente_despacho: 2, en_transito: 3 };

  function fechaBaseAlertaCaso(c) {
    if (!c) return "";
    if (c.estado === "pendiente_recojo") return c.fecha_caso || "";
    if (c.estado === "en_taller") return c.fecha_llegada_taller || c.fecha_recojo || c.fecha_caso || "";
    if (c.estado === "en_reparacion") return c.fecha_inicio_reparacion || c.fecha_llegada_taller || c.fecha_caso || "";
    if (c.estado === "listo_envio") return c.fecha_listo_envio || c.fecha_llegada_taller || c.fecha_caso || "";
    if (c.estado === "cambio_entregado") return c.fecha_cambio_entregado || c.fecha_recojo || c.fecha_caso || "";
    return "";
  }

  function evaluarAlertaCaso(c) {
    const sla = SLA_CASOS[c?.estado];
    if (!sla || isCerrado(c)) return null;
    const base = fechaBaseAlertaCaso(c);
    if (!base) return null;
    const dias = diasEntre(base, today());
    const nivel = dias >= sla ? "rojo" : dias >= Math.max(sla - 1, 0) ? "amarillo" : "verde";
    return { tipo:"caso", id:c.id, ref:c.ost || c.id, estado:c.estado, dias, sla, nivel, base, data:c };
  }

  function evaluarAlertaPedido(p) {
    const sla = SLA_PEDIDOS[p?.estado];
    if (!sla || p.estado === "recibido_taller") return null;
    const base = p.estado === "en_transito" ? (p.fecha_despacho || p.fecha_solicitud) : p.fecha_solicitud;
    if (!base) return null;
    const dias = diasEntre(base, today());
    const nivel = dias >= sla ? "rojo" : dias >= Math.max(sla - 1, 0) ? "amarillo" : "verde";
    return { tipo:"pedido", id:p.id, ref:p.num_pedido || p.id, estado:p.estado, dias, sla, nivel, base, data:p };
  }

  const alertas = useMemo(() => {
    const aCasos = casos.map(evaluarAlertaCaso).filter(Boolean);

      return rank[a.nivel] - rank[b.nivel] || b.dias - a.dias;
    });

  function findProductoByText(text) {
    const q = String(text || "").trim().toLowerCase();
    if (!q) return null;
    // Solo selecciona si hay coincidencia exacta.
    // Esto evita que la app complete un producto mientras todavía estás escribiendo.
    return productosList.find(p => {
      const cod = String(p.codsap || "").toLowerCase();
      const prod = String(p.producto || "").toLowerCase();
      const label = productLabel(p).toLowerCase();
      return q === cod || q === prod || q === label;
    }) || null;
  }

    return { ...base, producto:typed, codsap:"", familia:"" };
  }

  function aplicarProductoAForm(base, typed) {
    const p = findProductoByText(typed);
    if (p) return { ...base, codsap:p.codsap || "", producto:p.producto || productValue(p) || typed, familia:p.familia || "" };
    return { ...base, producto:typed, codsap:"", familia:"" };
  }

  function abrirEditarCaso(caso) {
    setEditCaso({ ...caso });
  }

  async function guardarEdicionCaso() {
    if (!editCaso?.id) return;
    const actualizado = { ...editCaso };
    setCasos(prev => prev.map(c => c.id === actualizado.id ? actualizado : c));
    setSelCaso(prev => prev?.id === actualizado.id ? actualizado : prev);
    setEditCaso(null);
    try {
      await apiPost("updateCaso", actualizado);
      if (apiEnabled()) setApiStatus("Caso editado y actualizado en Sheets");
    } catch (err) {
      console.error(err);
      setApiStatus(`No se pudo editar el caso: ${err.message}`);
    }
  }

  async function crearCaso() {
    const nuevoCaso = { ...formCaso, id:`OST-${formCaso.ost||genId("C",casos)}`, estado:"caso_recibido", dias_solucion:null, dias_reparacion:null };
    setCasos(prev => [...prev, nuevoCaso]);
    setShowNewCaso(false); setFormCaso(blankCaso);

    try {
      await apiPost("saveCaso", nuevoCaso);
      if (apiEnabled()) setApiStatus("Caso guardado en Sheets");
    } catch (err) {
      console.error(err);
      setApiStatus(`No se pudo guardar el caso: ${err.message}`);
    }
  }

  function estadoRequiereGuiaCaso(nuevoEstado) {
    return nuevoEstado === "en_ruta" || nuevoEstado === "enviado_tienda";
  }

  async function aplicarEstadoCaso(id, nuevoEstado, extra = {}) {
    const original = casos.find(c => c.id === id);
    if (!original) return;

    const esEstadoDeCierre = nuevoEstado === "regularizado" || nuevoEstado === "ingresado_sap";
    if (esEstadoDeCierre && !isCerrado(original)) {
      const okCerrar = window.confirm(
        `¿Desea cerrar el ticket ${original.id}?\n\n` +
        `Al confirmar se registrará la fecha de cierre y los días de solución.\n` +
        `Esta acción no debe realizarse hasta que el caso esté completamente regularizado.`
      );
      if (!okCerrar) return;
    }

    const up = { estado:nuevoEstado, ...extra };
    if (nuevoEstado === "pendiente_recojo" && original.tipo === "DEVOLUCION") up.modalidad_devolucion = "RECOJO_PROPIO";
    if (nuevoEstado === "en_ruta" && !up.fecha_recojo && !original.fecha_recojo) up.fecha_recojo = today();
    if (nuevoEstado === "en_taller" && !up.fecha_llegada_taller && !original.fecha_llegada_taller) up.fecha_llegada_taller = today();
    if (nuevoEstado === "en_reparacion" && !up.fecha_inicio_reparacion && !original.fecha_inicio_reparacion) up.fecha_inicio_reparacion = today();
    if (nuevoEstado === "listo_envio" && !up.fecha_listo_envio && !original.fecha_listo_envio) up.fecha_listo_envio = today();
    if (nuevoEstado === "cambio_entregado" && !up.fecha_cambio_entregado && !original.fecha_cambio_entregado) up.fecha_cambio_entregado = today();
    if (nuevoEstado === "enviado_tienda" && !up.fecha_envio_tienda && !original.fecha_envio_tienda) up.fecha_envio_tienda = today();
    if(nuevoEstado==="regularizado"||nuevoEstado==="ingresado_sap"){
      up.fecha_cierre=today();
      up.dias_solucion=diasEntre(original.fecha_caso,today());
    }
    if(nuevoEstado==="listo_envio"&&original.fecha_llegada_taller) {
      up.dias_reparacion=diasEntre(original.fecha_llegada_taller,today());
    }

    const actualizado = { ...original, ...up };

    setCasos(prev=>prev.map(c=>c.id===id?actualizado:c));
    setSelCaso(prev=>prev?.id===id?actualizado:prev);

    try {
      await apiPost("updateCaso", actualizado);
      if (apiEnabled()) setApiStatus("Caso actualizado en Sheets");
    } catch (err) {
      console.error(err);
      setApiStatus(`No se pudo actualizar el caso: ${err.message}`);
    }
  }

  async function actualizarEstado(id, nuevoEstado) {
    const original = casos.find(c => c.id === id);
    if (!original) return;

    if (nuevoEstado === "ellos_envian") {
      setCartaModal({
        id,
        nuevoEstado,
        fecha: original.fecha_carta_autorizacion || today(),
        obs:"",
      });
      return;
    }

    if (estadoRequiereGuiaCaso(nuevoEstado)) {
      const esRecojo = nuevoEstado === "en_ruta";
      setLogisticaModal({
        tipo:"caso",
        id,
        nuevoEstado,
        titulo: esRecojo ? "Confirmar recojo" : "Confirmar envío a tienda",
        guiaLabel: esRecojo ? "N° guía de recojo" : "N° guía de envío",
        transportista: esRecojo ? (original.transportista || "") : (original.transportista_envio || original.transportista || ""),
        guia: esRecojo ? (original.guia_recojo || "") : (original.guia_envio || ""),
        obs:"",
        fecha: today(),
      });
      return;
    }

    await aplicarEstadoCaso(id, nuevoEstado);
  }

  async function confirmarCartaAutorizacion() {
    if (!cartaModal) return;
    if (!cartaModal.fecha) { alert("Ingresa la fecha de envío de la carta de autorización."); return; }
    const original = casos.find(c=>c.id===cartaModal.id);
    const extra = {
      modalidad_devolucion:"ELLOS_ENVIAN",
      fecha_carta_autorizacion:cartaModal.fecha,
      obs: cartaModal.obs ? `${(original?.obs || "")} | Carta autorización: ${cartaModal.obs}`.trim() : (original?.obs || "")
    };
    const { id, nuevoEstado } = cartaModal;
    setCartaModal(null);
    await aplicarEstadoCaso(id, nuevoEstado, extra);
  }

  async function confirmarLogistica() {
    if (!logisticaModal) return;
    const guia = String(logisticaModal.guia || "").trim();
    const transportista = aplicarTransportistaText(String(logisticaModal.transportista || "").trim());
    if (!guia) { alert("Ingresa el número de guía para continuar."); return; }
    if (!transportista) { alert("Ingresa o selecciona el transportista para continuar."); return; }

    if (logisticaModal.tipo === "caso") {
      const esRecojo = logisticaModal.nuevoEstado === "en_ruta";
      const extra = esRecojo
        ? { transportista, guia_recojo:guia, fecha_recojo:logisticaModal.fecha || today(), obs: logisticaModal.obs ? `${(casos.find(c=>c.id===logisticaModal.id)?.obs || "")} | Recojo: ${logisticaModal.obs}`.trim() : (casos.find(c=>c.id===logisticaModal.id)?.obs || "") }
        : { transportista_envio:transportista, guia_envio:guia, fecha_envio_tienda:logisticaModal.fecha || today(), obs: logisticaModal.obs ? `${(casos.find(c=>c.id===logisticaModal.id)?.obs || "")} | Envío: ${logisticaModal.obs}`.trim() : (casos.find(c=>c.id===logisticaModal.id)?.obs || "") };
      const { id, nuevoEstado } = logisticaModal;
      setLogisticaModal(null);
      await aplicarEstadoCaso(id, nuevoEstado, extra);
      return;
    }

    if (logisticaModal.tipo === "pedido") {
      const original = pedidos.find(p=>p.id===logisticaModal.id);
      if (!original) { setLogisticaModal(null); return; }
      const actualizado = { ...original, estado:logisticaModal.nuevoEstado, guia, transportista, fecha_despacho:logisticaModal.fecha || today() };
      setPedidos(prev=>prev.map(p=>p.id===actualizado.id?actualizado:p));
      setSelPedido(prev=>prev?.id===actualizado.id?actualizado:prev);
      setLogisticaModal(null);
      try {
        await apiPost("updatePedido", { ...actualizado, items: undefined });
        if (apiEnabled()) setApiStatus("Pedido actualizado en Sheets");
      } catch (err) {
        console.error(err);
        setApiStatus(`No se pudo actualizar el pedido: ${err.message}`);
      }
    }
  }

  async function crearPedido() {
    const p = { ...formPedido, id:genId("PED",pedidos), estado:"pendiente_despacho", fecha_despacho:"", fecha_recibo_taller:"", guia:"", dias_respuesta:null };
    setPedidos(prev => [...prev, p]);

      console.error(err);

  async function actualizarEstadoPedido(id, estado) {
    const original = pedidos.find(p=>p.id===id);
    if (!original) return;

    if (estado === "en_transito") {
      setLogisticaModal({
        tipo:"pedido",
        id,
        nuevoEstado:estado,
        titulo:"Despacho de repuesto",
        guiaLabel:"N° guía de envío de repuesto",

        guia: original.guia || "",
        obs:"",

    const extra = estado==="recibido_taller"

    if (!usuarios.length) { setLoginError("No hay usuarios cargados en la hoja USUARIOS. Agrega tu correo y recarga el HTML."); return; }

    if (!user) { setLoginError("Correo no autorizado o usuario inactivo. Verifica la hoja USUARIOS."); return; }
    setCurrentUser(user);
    localStorage.setItem("postventa_user", JSON.stringify(user));

                    <div style={{ display:"flex", gap:14 }}>
                      {promD && <span style={{ fontSize:11, color:"#8b5cf6" }}>⏱ Prom. {promD}d</span>}
                      {peds>0 && <span style={{ fontSize:11, color:"#f59e0b" }}>📦 {peds} pedidos</span>}
                    </div>
                    <div style={{ fontSize:10, color:"#334155", marginTop:5 }}>SAP: {t.id} · {casosT.length} casos</div>
                  </div>
                );
              })}
              {talleresFiltrados.length===0 && <div style={{ textAlign:"center", color:"#334155", padding:50, ...S.card }}>Sin talleres encontrados con los filtros actuales</div>}
            </div>
          </div>
        )}
      </main>

      {/* ══════════ MODALES ══════════ */}

      {/* Detalle Caso */}
      {selCaso && (
        <Modal title={`Caso ${selCaso.id}`} onClose={()=>setSelCaso(null)}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:0 }}>
            <Field label="Tienda"><div style={{ color:"#f1f5f9", fontWeight:600 }}>{selCaso.tienda}</div></Field>
            <Field label="Local"><div style={{ color:"#94a3b8" }}>{selCaso.local}</div></Field>
            <Field label="Producto"><div style={{ color:"#fbbf24", fontWeight:600 }}>{selCaso.codsap ? `${selCaso.codsap} - ${selCaso.producto}` : selCaso.producto}</div></Field>
            <Field label="Tipo"><TipoBadge tipo={selCaso.tipo} /></Field>
            {selCaso.falla && <Field label="Falla"><div style={{ color:"#ef4444" }}>{selCaso.falla}</div></Field>}
            {selCaso.tipo==="DEVOLUCION" && selCaso.modalidad_devolucion && <Field label="Modalidad devolución"><div style={{ color:"#14b8a6", fontWeight:600 }}>{selCaso.modalidad_devolucion==="ELLOS_ENVIAN"?"Ellos envían":"Pendiente de recojo"}</div></Field>}
            <Field label="Transportista"><div style={{ color:"#94a3b8" }}>{selCaso.transportista||"—"}</div></Field>
            {selCaso.tipo==="SERVICIO TECNICO" && <Field label="Taller ST" span2><div style={{ color:"#0ea5e9" }}>{getTaller(selCaso.taller_id)?.nombre||"—"} <span style={{ color:"#334155", fontSize:12 }}>· {getTaller(selCaso.taller_id)?.provincia}</span></div></Field>}
          </div>
          <div style={{ background:"#1e293b", borderRadius:10, padding:14, marginBottom:14 }}>
            <div style={{ fontSize:11, color:"#475569", fontWeight:700, marginBottom:10, textTransform:"uppercase" }}>Timeline</div>
            {[
              { label:"Fecha del caso",          val:selCaso.fecha_caso },
              ...(selCaso.tipo==="DEVOLUCION"?[{ label:"Carta de autorización", val:selCaso.fecha_carta_autorizacion }]:[]),
              { label:"Recojo / despacho",        val:selCaso.fecha_recojo, guia:selCaso.guia_recojo },
              ...(selCaso.tipo==="SERVICIO TECNICO"?[
                { label:"Llegada taller/MAPALSA",   val:selCaso.fecha_llegada_taller },
                { label:"Enviado a tienda",          val:selCaso.fecha_envio_tienda, guia:selCaso.guia_envio },
              ]:[]),
              { label:"Fecha de cierre",          val:selCaso.fecha_cierre },
            ].map((row,i)=>(
              <div key={i} style={{ display:"flex", justifyContent:"space-between", marginBottom:7 }}>
                <span style={{ color:"#64748b", fontSize:12 }}>{row.label}</span>
                <div style={{ textAlign:"right" }}>
                  <span style={{ color:row.val?"#f1f5f9":"#334155", fontSize:12, fontWeight:row.val?600:400 }}>{row.val||"—"}</span>
                  {row.guia && <div style={{ color:"#475569", fontSize:10 }}>{row.guia}</div>}
                </div>
              </div>
            ))}
            {(selCaso.dias_solucion||selCaso.dias_reparacion) && (
              <div style={{ borderTop:"1px solid #334155", marginTop:8, paddingTop:8, display:"flex", gap:20 }}>
                {selCaso.dias_solucion>0 && <div><span style={{ color:"#8b5cf6", fontWeight:800 }}>{selCaso.dias_solucion}d</span><span style={{ color:"#475569", fontSize:11 }}> solución</span></div>}
                {selCaso.dias_reparacion>0 && <div><span style={{ color:"#0ea5e9", fontWeight:800 }}>{selCaso.dias_reparacion}d</span><span style={{ color:"#475569", fontSize:11 }}> reparación</span></div>}
              </div>
            )}
          </div>
          {selCaso.obs && <div style={{ color:"#64748b", fontSize:13, marginBottom:14, fontStyle:"italic" }}>"{selCaso.obs}"</div>}
          {!isCerrado(selCaso) ? <EstadoStepper tipo={selCaso.tipo} estadoActual={selCaso.estado} onCambiar={id=>actualizarEstado(selCaso.id,id)} />
            : <div style={{ background:"#10b98122", border:"1px solid #10b98144", borderRadius:10, padding:"12px 16px", marginBottom:16, color:"#10b981", fontSize:13, fontWeight:700 }}>✅ Caso cerrado — {selCaso.estado==="ingresado_sap"?"Ingresado en SAP":"Regularizado"}</div>}
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={()=>abrirEditarCaso(selCaso)} style={S.btn("#8b5cf6")}>Editar caso</button>
            <button onClick={()=>setSelCaso(null)} style={S.btnO}>Cerrar</button>
          </div>
        </Modal>
      )}

      {/* Detalle Pedido */}
      {selPedido && (
        <Modal title={`Pedido ${selPedido.id} — ${selPedido.num_pedido}`} onClose={()=>setSelPedido(null)} wide>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:0 }}>
            <Field label="Taller"><div style={{ color:"#f1f5f9", fontWeight:600 }}>{getTaller(selPedido.taller_id)?.nombre||"—"}</div></Field>
            <Field label="Tipo de pedido"><span style={S.tag(selPedido.tipo_pedido==="GARANTIA"?"#10b981":selPedido.tipo_pedido==="VENTA"?"#0ea5e9":"#f59e0b")}>{selPedido.tipo_pedido}</span></Field>
            <Field label="Fecha solicitud"><div style={{ color:"#94a3b8" }}>{selPedido.fecha_solicitud}</div></Field>
            <Field label="Fecha despacho"><div style={{ color:selPedido.fecha_despacho?"#f1f5f9":"#334155" }}>{selPedido.fecha_despacho||"Pendiente"}</div></Field>
            <Field label="Recibo en taller"><div style={{ color:selPedido.fecha_recibo_taller?"#10b981":"#334155" }}>{selPedido.fecha_recibo_taller||"Pendiente"}</div></Field>
            <Field label="Guía de envío"><div style={{ color:selPedido.guia?"#0ea5e9":"#334155" }}>{selPedido.guia||"—"}</div></Field>
          </div>
          {selPedido.dias_respuesta && <div style={{ background:"#10b98122", border:"1px solid #10b98144", borderRadius:8, padding:"10px 14px", marginBottom:14, color:"#10b981", fontWeight:700, fontSize:13 }}>✓ Respondido en {selPedido.dias_respuesta} días hábiles</div>}
          {selPedido.notas && <div style={{ color:"#64748b", fontSize:13, marginBottom:14, fontStyle:"italic" }}>"{selPedido.notas}"</div>}

          {/* Items */}
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:11, color:"#475569", fontWeight:700, marginBottom:10, textTransform:"uppercase" }}>Repuestos del pedido — {selPedido.items.reduce((a,i)=>a+i.cantidad,0)} unidades</div>
            <div style={{ background:"#1e293b", borderRadius:10, overflow:"hidden" }}>
              <div style={{ display:"grid", gridTemplateColumns:"2fr 1.2fr 1.5fr 60px", gap:0, borderBottom:"1px solid #334155" }}>
                {["Repuesto","Referencia","Producto","Cant."].map(h=><div key={h} style={{ padding:"8px 12px", color:"#475569", fontSize:11, fontWeight:700 }}>{h}</div>)}
              </div>
              {selPedido.items.map((it,i)=>(
                <div key={i} style={{ display:"grid", gridTemplateColumns:"2fr 1.2fr 1.5fr 60px", gap:0, borderBottom:i<selPedido.items.length-1?"1px solid #334155":"none" }}>
                  <div style={{ padding:"10px 12px", color:"#f1f5f9", fontSize:13 }}>{it.repuesto}</div>
                  <div style={{ padding:"10px 12px", color:"#64748b", fontSize:12 }}>{it.referencia}</div>
                  <div style={{ padding:"10px 12px", color:"#94a3b8", fontSize:12 }}>{it.producto}</div>
                  <div style={{ padding:"10px 12px", color:"#0ea5e9", fontWeight:700, fontSize:13 }}>{it.cantidad}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, color:"#475569", fontWeight:700, marginBottom:10, textTransform:"uppercase" }}>Actualizar estado</div>
            <div style={{ display:"flex", gap:8 }}>
              {ESTADOS_REP.map(e=>(
                <button key={e.id} onClick={()=>actualizarEstadoPedido(selPedido.id,e.id)}
                  style={{ background:selPedido.estado===e.id?e.color:"#1e293b", color:selPedido.estado===e.id?"#fff":"#64748b", border:`1px solid ${selPedido.estado===e.id?e.color:"#334155"}`, borderRadius:20, padding:"6px 14px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
                  {e.label}
                </button>
              ))}
            </div>
          </div>
          <button onClick={()=>setSelPedido(null)} style={S.btnO}>Cerrar</button>
        </Modal>
      )}

      {/* Detalle Taller */}
      {selTaller && (
        <Modal title={selTaller.nombre} onClose={()=>setSelTaller(null)}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:0 }}>
            <Field label="Provincia"><div style={{ color:"#f1f5f9" }}>{selTaller.provincia}</div></Field>
            <Field label="Código SAP"><div style={{ color:"#64748b" }}>{selTaller.id}</div></Field>
            <Field label="Contacto"><div style={{ color:"#94a3b8" }}>{selTaller.contacto||"—"}</div></Field>
            <Field label="Teléfono"><div style={{ color:"#94a3b8" }}>{selTaller.tel||"—"}</div></Field>
          </div>
          <Field label="Email" span2><div style={{ color:"#0ea5e9" }}>{selTaller.email||"—"}</div></Field>
          <Field label="Dirección" span2><div style={{ color:"#64748b", fontSize:13 }}>{selTaller.dir||"—"}</div></Field>
          {selTaller.horario && <Field label="Horario" span2><div style={{ color:"#64748b", fontSize:13 }}>{selTaller.horario}</div></Field>}
          {(()=>{
            const casosT=casos.filter(c=>c.taller_id===selTaller.id);
            const pedsT=pedidos.filter(p=>p.taller_id===selTaller.id);
            return (
              <div style={{ background:"#1e293b", borderRadius:10, padding:14 }}>
                <div style={{ display:"flex", gap:24 }}>
                  <div><span style={{ color:"#0ea5e9", fontWeight:800, fontSize:20 }}>{casosT.length}</span><div style={{ color:"#475569", fontSize:11 }}>casos</div></div>
                  <div><span style={{ color:"#f97316", fontWeight:800, fontSize:20 }}>{casosT.filter(c=>!isCerrado(c)).length}</span><div style={{ color:"#475569", fontSize:11 }}>activos</div></div>
                  <div><span style={{ color:"#8b5cf6", fontWeight:800, fontSize:20 }}>{pedsT.length}</span><div style={{ color:"#475569", fontSize:11 }}>pedidos</div></div>
                </div>
              </div>
            );
          })()}
          <button onClick={()=>setSelTaller(null)} style={{ ...S.btnO, marginTop:16 }}>Cerrar</button>
        </Modal>
      )}


      {/* Editar Caso */}
      {editCaso && (
        <Modal title={`Editar caso ${editCaso.id}`} onClose={()=>setEditCaso(null)} wide>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <Field label="OST / N° de caso"><input style={S.inp} value={editCaso.ost || ""} onChange={e=>setEditCaso({...editCaso,ost:e.target.value})} /></Field>
            <Field label="Fecha del caso"><input style={S.inp} type="date" value={editCaso.fecha_caso || ""} onChange={e=>setEditCaso({...editCaso,fecha_caso:e.target.value})} /></Field>
            {editCaso.tipo==="DEVOLUCION" && <Field label="Fecha carta autorización"><input style={S.inp} type="date" value={editCaso.fecha_carta_autorizacion || ""} onChange={e=>setEditCaso({...editCaso,fecha_carta_autorizacion:e.target.value, modalidad_devolucion: editCaso.modalidad_devolucion || "ELLOS_ENVIAN"})} /></Field>}
            <Field label="Tipo de caso">
              <select style={S.inp} value={editCaso.tipo || "SERVICIO TECNICO"} onChange={e=>setEditCaso({...editCaso,tipo:e.target.value})}>
                {TIPOS.map(t=><option key={t}>{t}</option>)}
              </select>
            </Field>
            <Field label="Estado">
              <select style={S.inp} value={editCaso.estado || "caso_recibido"} onChange={e=>setEditCaso({...editCaso,estado:e.target.value})}>
                {getEstados(editCaso.tipo || "SERVICIO TECNICO").map(e=><option key={e.id} value={e.id}>{e.label}</option>)}
              </select>
            </Field>
            <Field label="Tienda (cadena)">
              <input style={S.inp} list="tiendas-list-edit" value={editCaso.tienda || ""}
                onChange={e=>setEditCaso(escribirTiendaEnForm(editCaso, e.target.value))}
                onBlur={e=>setEditCaso(aplicarTiendaAForm(editCaso, e.target.value))}
                placeholder="Escribe tienda, local o código..." />
              <datalist id="tiendas-list-edit">{tiendasList.map(t=><option key={tiendaLabel(t)} value={tiendaLabel(t)} />)}</datalist>
              {editCaso.cod_tienda && <div style={{ color:"#64748b", fontSize:11, marginTop:4 }}>Código tienda: {editCaso.cod_tienda}</div>}
            </Field>
            <Field label="Local específico"><input style={S.inp} value={editCaso.local || ""} onChange={e=>setEditCaso({...editCaso,local:e.target.value})} /></Field>
            <Field label="Producto">
              <input
                style={S.inp}
                list="productos-list-edit"
                value={editCaso.producto || ""}
                onChange={e=>setEditCaso(escribirProductoEnForm(editCaso, e.target.value))}
                onBlur={e=>setEditCaso(aplicarProductoAForm(editCaso, e.target.value))}
                placeholder="Escribe CODSAP o producto..."
              />
              <datalist id="productos-list-edit">
                {productosList.map(p=><option key={p.codsap || p.producto} value={productLabel(p)} />)}
              </datalist>
              {editCaso.codsap && <div style={{ color:"#64748b", fontSize:11, marginTop:4 }}>CODSAP: {editCaso.codsap}{editCaso.familia ? ` · ${editCaso.familia}` : ""}</div>}
            </Field>
            <Field label="Falla reportada">
              <input
                style={S.inp}
                list="fallas-list-edit"
                value={editCaso.falla || ""}
                onChange={e=>setEditCaso(escribirFallaEnForm(editCaso, e.target.value))}
                onBlur={e=>setEditCaso(aplicarFallaAForm(editCaso, e.target.value))}
                placeholder="Escribe COD_FALLA o falla..."
              />
              <datalist id="fallas-list-edit">
                {fallasList.map(f=><option key={f.cod_falla || f.falla} value={fallaLabel(f)} />)}
              </datalist>
              {editCaso.cod_falla && <div style={{ color:"#64748b", fontSize:11, marginTop:4 }}>Código: {editCaso.cod_falla}{editCaso.categoria_falla ? ` · ${editCaso.categoria_falla}` : ""}</div>}
            </Field>
            {editCaso.tipo==="SERVICIO TECNICO" && (
              <Field label="Taller ST asignado" span2>
                <input style={S.inp} list="talleres-list-edit" value={editCaso.taller || ""}
                  onChange={e=>setEditCaso(escribirTallerEnForm(editCaso, e.target.value))}
                  onBlur={e=>setEditCaso(aplicarTallerAForm(editCaso, e.target.value))}
                  placeholder="Escribe código, taller o provincia..." />
                <datalist id="talleres-list-edit">{talleresList.map(t=><option key={t.id || t.cod_taller || t.nombre} value={`${(t.id || t.cod_taller) ? (t.id || t.cod_taller) + " - " : ""}${t.nombre || t.label || ""}${t.provincia ? " — " + t.provincia : ""}`} />)}</datalist>
              </Field>
            )}
            <Field label="Transportista">
              <input style={S.inp} list="transportistas-list-edit" value={editCaso.transportista || ""}
                onChange={e=>setEditCaso({...editCaso,transportista:e.target.value})}
                onBlur={e=>setEditCaso({...editCaso,transportista:aplicarTransportistaText(e.target.value)})}
                placeholder="Escribe transportista..." />
              <datalist id="transportistas-list-edit">{transportistasList.map(t=><option key={transportistaValue(t)} value={transportistaLabel(t)} />)}</datalist>
            </Field>
            <Field label="Fecha de recojo"><input style={S.inp} type="date" value={editCaso.fecha_recojo || ""} onChange={e=>setEditCaso({...editCaso,fecha_recojo:e.target.value})} /></Field>
            <Field label="Guía recojo"><input style={S.inp} value={editCaso.guia_recojo || ""} onChange={e=>setEditCaso({...editCaso,guia_recojo:e.target.value})} /></Field>
            <Field label="Llegada taller/MAPALSA"><input style={S.inp} type="date" value={editCaso.fecha_llegada_taller || ""} onChange={e=>setEditCaso({...editCaso,fecha_llegada_taller:e.target.value})} /></Field>
            <Field label="Enviado a tienda"><input style={S.inp} type="date" value={editCaso.fecha_envio_tienda || ""} onChange={e=>setEditCaso({...editCaso,fecha_envio_tienda:e.target.value})} /></Field>
            <Field label="Transportista envío"><input style={S.inp} list="transportistas-list-edit-envio" value={editCaso.transportista_envio || ""} onChange={e=>setEditCaso({...editCaso,transportista_envio:e.target.value})} onBlur={e=>setEditCaso({...editCaso,transportista_envio:aplicarTransportistaText(e.target.value)})} /></Field>
            <datalist id="transportistas-list-edit-envio">{transportistasList.map(t=><option key={transportistaValue(t)} value={transportistaLabel(t)} />)}</datalist>
            <Field label="Guía envío"><input style={S.inp} value={editCaso.guia_envio || ""} onChange={e=>setEditCaso({...editCaso,guia_envio:e.target.value})} /></Field>
            <Field label="Fecha cierre"><input style={S.inp} type="date" value={editCaso.fecha_cierre || ""} onChange={e=>setEditCaso({...editCaso,fecha_cierre:e.target.value})} /></Field>
          </div>
          <Field label="Observaciones"><input style={S.inp} value={editCaso.obs || ""} onChange={e=>setEditCaso({...editCaso,obs:e.target.value})} placeholder="Notas adicionales" /></Field>
          <div style={{ display:"flex", gap:10, marginTop:8 }}>
            <button onClick={guardarEdicionCaso} disabled={!editCaso.tienda||!editCaso.producto} style={{ ...S.btn("#8b5cf6"), opacity:(!editCaso.tienda||!editCaso.producto)?0.4:1 }}>Guardar cambios</button>
            <button onClick={()=>setEditCaso(null)} style={S.btnO}>Cancelar</button>
          </div>
        </Modal>
      )}

      {/* Confirmación carta de autorización */}
      {cartaModal && (
        <Modal title="Carta de autorización" onClose={()=>setCartaModal(null)}>
          <div style={{ color:"#64748b", fontSize:13, marginBottom:14 }}>
            Registra la fecha en que se envió la carta de autorización para que la tienda/CD despache el producto. Este dato quedará como KPI de atención.
          </div>
          <Field label="Fecha de envío de carta">
            <input style={S.inp} type="date" value={cartaModal.fecha || today()} onChange={e=>setCartaModal({...cartaModal,fecha:e.target.value})} autoFocus />
          </Field>
          <Field label="Observación">
            <input style={S.inp} value={cartaModal.obs || ""} onChange={e=>setCartaModal({...cartaModal,obs:e.target.value})} placeholder="Opcional: correo, tienda, CD, comentario..." />
          </Field>
          <div style={{ display:"flex", gap:10, marginTop:8 }}>
            <button onClick={confirmarCartaAutorizacion} style={S.btn("#10b981")}>Confirmar y actualizar estado</button>
            <button onClick={()=>setCartaModal(null)} style={S.btnO}>Cancelar</button>
          </div>
        </Modal>
      )}

      {/* Confirmación logística */}
      {logisticaModal && (
        <Modal title={logisticaModal.titulo} onClose={()=>setLogisticaModal(null)}>
          <div style={{ color:"#64748b", fontSize:13, marginBottom:14 }}>
            Para cambiar a este estado, registra la guía y el transportista. Así quedará trazabilidad logística en Sheets.
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <Field label="Transportista">
              <input style={S.inp} list="transportistas-list-logistica" value={logisticaModal.transportista || ""}
                onChange={e=>setLogisticaModal({...logisticaModal,transportista:e.target.value})}
                onBlur={e=>setLogisticaModal({...logisticaModal,transportista:aplicarTransportistaText(e.target.value)})}
                placeholder="Escribe transportista..." />
              <datalist id="transportistas-list-logistica">{transportistasList.map(t=><option key={transportistaValue(t)} value={transportistaLabel(t)} />)}</datalist>
            </Field>
            <Field label="Fecha del movimiento">
              <input style={S.inp} type="date" value={logisticaModal.fecha || today()} onChange={e=>setLogisticaModal({...logisticaModal,fecha:e.target.value})} />
            </Field>
            <Field label={logisticaModal.guiaLabel} span2>
              <input style={S.inp} value={logisticaModal.guia || ""} onChange={e=>setLogisticaModal({...logisticaModal,guia:e.target.value})} placeholder="Ej: SCH-548796" autoFocus />
            </Field>
          </div>
          <Field label="Observación logística">
            <input style={S.inp} value={logisticaModal.obs || ""} onChange={e=>setLogisticaModal({...logisticaModal,obs:e.target.value})} placeholder="Opcional" />
          </Field>
          <div style={{ display:"flex", gap:10, marginTop:8 }}>
            <button onClick={confirmarLogistica} style={S.btn("#10b981")}>Confirmar y actualizar estado</button>
            <button onClick={()=>setLogisticaModal(null)} style={S.btnO}>Cancelar</button>
          </div>
        </Modal>
      )}

      {/* Nuevo Caso */}
      {showNewCaso && (
        <Modal title="Registrar nuevo caso" onClose={()=>setShowNewCaso(false)}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <Field label="OST / N° de caso"><input style={S.inp} value={formCaso.ost} onChange={e=>setFormCaso({...formCaso,ost:e.target.value})} placeholder="Ej: 76800" /></Field>
            <Field label="Fecha del caso"><input style={S.inp} type="date" value={formCaso.fecha_caso} onChange={e=>setFormCaso({...formCaso,fecha_caso:e.target.value})} /></Field>
            <Field label="Tipo de caso">
              <select style={S.inp} value={formCaso.tipo} onChange={e=>setFormCaso({...formCaso,tipo:e.target.value})}>
                {TIPOS.map(t=><option key={t}>{t}</option>)}
              </select>
            </Field>
            <Field label="Tienda (cadena)">
              <input style={S.inp} list="tiendas-list" value={formCaso.tienda}
                onChange={e=>setFormCaso(escribirTiendaEnForm(formCaso, e.target.value))}
                onBlur={e=>setFormCaso(aplicarTiendaAForm(formCaso, e.target.value))}
                placeholder="Escribe tienda, local o código..." />
              <datalist id="tiendas-list">{tiendasList.map(t=><option key={tiendaLabel(t)} value={tiendaLabel(t)} />)}</datalist>
              {formCaso.cod_tienda && <div style={{ color:"#64748b", fontSize:11, marginTop:4 }}>Código tienda: {formCaso.cod_tienda}</div>}
            </Field>
            <Field label="Local específico"><input style={S.inp} value={formCaso.local} onChange={e=>setFormCaso({...formCaso,local:e.target.value})} placeholder="Ej: PROMART SALAVERRY" /></Field>
            <Field label="Producto">
              <input
                style={S.inp}
                list="productos-list"
                value={formCaso.producto}
                onChange={e=>setFormCaso(escribirProductoEnForm(formCaso, e.target.value))}
                onBlur={e=>setFormCaso(aplicarProductoAForm(formCaso, e.target.value))}
                placeholder="Escribe CODSAP o producto..."
              />
              <datalist id="productos-list">
                {productosList.map(p=><option key={p.codsap || p.producto} value={productLabel(p)} />)}
              </datalist>
              {formCaso.codsap && <div style={{ color:"#64748b", fontSize:11, marginTop:4 }}>CODSAP: {formCaso.codsap}{formCaso.familia ? ` · ${formCaso.familia}` : ""}</div>}
            </Field>
            {formCaso.tipo==="SERVICIO TECNICO" && (
              <Field label="Taller ST asignado" span2>
                <input style={S.inp} list="talleres-list" value={formCaso.taller}
                  onChange={e=>setFormCaso(escribirTallerEnForm(formCaso, e.target.value))}
                  onBlur={e=>setFormCaso(aplicarTallerAForm(formCaso, e.target.value))}
                  placeholder="Escribe código, taller o provincia..." />
                <datalist id="talleres-list">{talleresList.map(t=><option key={t.id || t.cod_taller || t.nombre} value={`${(t.id || t.cod_taller) ? (t.id || t.cod_taller) + " - " : ""}${t.nombre || t.label || ""}${t.provincia ? " — " + t.provincia : ""}`} />)}</datalist>
              </Field>
            )}
            <Field label="Transportista">
              <input style={S.inp} list="transportistas-list" value={formCaso.transportista}
                onChange={e=>setFormCaso({...formCaso,transportista:e.target.value})}
                onBlur={e=>setFormCaso({...formCaso,transportista:aplicarTransportistaText(e.target.value)})}
                placeholder="Escribe transportista..." />
              <datalist id="transportistas-list">{transportistasList.map(t=><option key={transportistaValue(t)} value={transportistaLabel(t)} />)}</datalist>
            </Field>
            <Field label="Fecha de recojo"><input style={S.inp} type="date" value={formCaso.fecha_recojo} onChange={e=>setFormCaso({...formCaso,fecha_recojo:e.target.value})} /></Field>
            <Field label="Falla reportada">
              <input
                style={S.inp}
                list="fallas-list"
                value={formCaso.falla}
                onChange={e=>setFormCaso(escribirFallaEnForm(formCaso, e.target.value))}
                onBlur={e=>setFormCaso(aplicarFallaAForm(formCaso, e.target.value))}
                placeholder="Escribe COD_FALLA o falla..."
              />
              <datalist id="fallas-list">
                {fallasList.map(f=><option key={f.cod_falla || f.falla} value={fallaLabel(f)} />)}
              </datalist>
              {formCaso.cod_falla && <div style={{ color:"#64748b", fontSize:11, marginTop:4 }}>Código: {formCaso.cod_falla}{formCaso.categoria_falla ? ` · ${formCaso.categoria_falla}` : ""}</div>}
            </Field>
          </div>
          <Field label="Observaciones"><input style={S.inp} value={formCaso.obs} onChange={e=>setFormCaso({...formCaso,obs:e.target.value})} placeholder="Notas adicionales" /></Field>
          <div style={{ display:"flex", gap:10, marginTop:8 }}>
            <button onClick={crearCaso} disabled={!formCaso.tienda||!formCaso.producto} style={{ ...S.btn(), opacity:(!formCaso.tienda||!formCaso.producto)?0.4:1 }}>Crear caso</button>
            <button onClick={()=>setShowNewCaso(false)} style={S.btnO}>Cancelar</button>
          </div>
        </Modal>
      )}

      {/* Nuevo Pedido */}
      {showNewPedido && (
        <Modal title="Registrar pedido del taller" onClose={()=>setShowNewPedido(false)} wide>
          <div style={{ background:"#1e293b", borderRadius:8, padding:"10px 14px", marginBottom:14, fontSize:12, color:"#64748b" }}>
            El taller genera un número de pedido → tú lo registras aquí con todos los repuestos que solicita en ese pedido.
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
            <Field label="Taller que solicita">
              <input style={S.inp} list="talleres-list-pedido" value={formPedido.taller || ""}
                onChange={e=>setFormPedido(escribirTallerEnForm(formPedido, e.target.value))}
                onBlur={e=>setFormPedido(aplicarTallerAForm(formPedido, e.target.value))}
                placeholder="Escribe código, taller o provincia..." />
              <datalist id="talleres-list-pedido">{talleresList.map(t=><option key={t.id || t.cod_taller || t.nombre} value={`${(t.id || t.cod_taller) ? (t.id || t.cod_taller) + " - " : ""}${t.nombre || t.label || ""}${t.provincia ? " — " + t.provincia : ""}`} />)}</datalist>
            </Field>
            <Field label="Tipo de pedido">
              <select style={S.inp} value={formPedido.tipo_pedido} onChange={e=>setFormPedido({...formPedido,tipo_pedido:e.target.value})}>
                {TIPO_PEDIDO_OPTS.map(t=><option key={t}>{t}</option>)}
              </select>
            </Field>
            <Field label="Número de pedido del taller">
              <input style={S.inp} value={formPedido.num_pedido} onChange={e=>setFormPedido({...formPedido,num_pedido:e.target.value})} placeholder="Ej: GARANTIAS #44 / VENTA #6" />
            </Field>
            <Field label="Fecha de solicitud">
              <input style={S.inp} type="date" value={formPedido.fecha_solicitud} onChange={e=>setFormPedido({...formPedido,fecha_solicitud:e.target.value})} />
            </Field>
            <Field label="Transportista envío repuesto">
              <input style={S.inp} list="transportistas-list-pedido" value={formPedido.transportista || ""} onChange={e=>setFormPedido({...formPedido,transportista:e.target.value})} onBlur={e=>setFormPedido({...formPedido,transportista:aplicarTransportistaText(e.target.value)})} placeholder="Opcional al crear" />
              <datalist id="transportistas-list-pedido">{transportistasList.map(t=><option key={transportistaValue(t)} value={transportistaLabel(t)} />)}</datalist>
            </Field>
            <Field label="Guía envío repuesto">
              <input style={S.inp} value={formPedido.guia || ""} onChange={e=>setFormPedido({...formPedido,guia:e.target.value})} placeholder="Opcional al crear" />
            </Field>
          </div>
          <div style={{ marginBottom:14 }}>
            <ItemsRepuesto items={formPedido.items} onChange={items=>setFormPedido({...formPedido,items})} productos={productosList} repuestos={maestros.repuestos} />
          </div>
          <Field label="Notas generales del pedido">
            <input style={S.inp} value={formPedido.notas} onChange={e=>setFormPedido({...formPedido,notas:e.target.value})} placeholder="Observaciones del pedido" />
          </Field>
          <div style={{ display:"flex", gap:10, marginTop:10 }}>
            <button onClick={crearPedido}
              disabled={!formPedido.taller_id||!formPedido.num_pedido||formPedido.items.some(i=>!i.repuesto)}
              style={{ ...S.btn("#8b5cf6"), opacity:(!formPedido.taller_id||!formPedido.num_pedido||formPedido.items.some(i=>!i.repuesto))?0.4:1 }}>
              Registrar pedido
            </button>
            <button onClick={()=>setShowNewPedido(false)} style={S.btnO}>Cancelar</button>
          </div>
        </Modal>
      )}

    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
